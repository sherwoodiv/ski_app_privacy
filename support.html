<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Boys Trip</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            color: #1d1d1f;
            background: #f5f5f7;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6e6e73;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 36px;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            margin-bottom: 12px;
        }
        a { color: #0071e3; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .back-link {
            display: inline-block;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .support-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px 28px;
            margin-bottom: 16px;
            border: 1px solid #d2d2d7;
        }
        .support-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .support-card p {
            color: #6e6e73;
            font-size: 0.95rem;
            margin-bottom: 0;
        }
        .support-card a {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">&larr; Back to Boys Trip</a>

        <h1>Support</h1>
        <p class="subtitle">Need help with Boys Trip? Here's how to reach us.</p>

        <div class="support-card">
            <h3>Report a Bug or Request a Feature</h3>
            <p>Open an issue on GitHub and we'll take a look.<br>
            <a href="https://github.com/sherwoodiv/ski_app_privacy/issues">github.com/sherwoodiv/ski_app_privacy/issues</a></p>
        </div>

        <div class="support-card">
            <h3>Email</h3>
            <p>For anything else, reach out directly.<br>
            <a href="mailto:henrysherwood4@gmail.com">henrysherwood4@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
